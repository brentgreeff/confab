default: &default
  adapter: postgresql
  encoding: unicode
  username: confab
  password: password
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  variables:
    statement_timeout: 5000

development:
  <<: *default
  host: localhost
  database: confab_development

test:
  <<: *default
  host: localhost
  database: confab_test

production:
  primary: &primary_production
    <<: *default
    database: confab_production
    username: confab
    password: <%= ENV["CONFAB_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: confab_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: confab_production_queue
    migrations_paths: db/queue_migrate
